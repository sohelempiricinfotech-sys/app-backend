openapi: 3.1.0
info:
  title: App Backend Public API
  version: 1.8.0
  description: Public API contract for app-backend.
  x-release-tag: api-v1.8.0
  x-generated-by: fastapi
servers:
  - url: https://api.example.test
tags:
  - name: users
  - name: orders
  - name: invoices
  - name: search
  - name: sessions
  - name: profiles
paths:
  /v1/users/{userId}:
    get:
      tags: [users]
      operationId: getUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: "^usr_[A-Za-z0-9]+$"
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/users:
    post:
      tags: [users]
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid user payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/orders/{orderId}:
    get:
      tags: [orders]
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            pattern: "^ord_[A-Za-z0-9]+$"
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/orders:
    post:
      tags: [orders]
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid order payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/invoices/{invoiceId}:
    get:
      tags: [invoices]
      operationId: getInvoice
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            pattern: "^inv_[A-Za-z0-9_]+$"
      responses:
        "200":
          description: Invoice found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/search:
    get:
      tags: [search]
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [user, order]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Invalid search query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/sessions/{sessionId}:
    delete:
      tags: [sessions]
      operationId: revokeSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            pattern: "^sess_[A-Za-z0-9]+$"
      responses:
        "204":
          description: Session revoked
  /v1/profiles/{profileId}:
    get:
      tags: [profiles]
      operationId: getProfile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
            pattern: "^prof_[A-Za-z0-9]+$"
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/feature-flags:
    get:
      tags: [profiles]
      operationId: getFeatureFlags
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlagList"
components:
  schemas:
    Error:
      type: object
      required: [code, message]
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string
    User:
      type: object
      required: [id, email, fullName, status, createdAt]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^usr_[A-Za-z0-9]+$"
        email:
          type: string
          format: email
        fullName:
          type: string
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        marketingOptIn:
          type: boolean
          default: false
    CreateUserRequest:
      type: object
      required: [email, fullName]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        fullName:
          type: string
          minLength: 1
        marketingOptIn:
          type: boolean
          default: false
    Order:
      type: object
      required: [id, userId, amount, currency, status, lineItems, createdAt]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^ord_[A-Za-z0-9]+$"
        userId:
          type: string
          pattern: "^usr_[A-Za-z0-9]+$"
        amount:
          type: number
          minimum: 0
        currency:
          type: string
          enum: [USD, EUR, INR]
        status:
          type: string
          enum: [created, paid, cancelled]
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderLineItem"
        createdAt:
          type: string
          format: date-time
    OrderLineItem:
      type: object
      required: [sku, quantity, unitPrice]
      additionalProperties: false
      properties:
        sku:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          minimum: 0
    CreateOrderRequest:
      type: object
      required: [userId, currency, items]
      additionalProperties: false
      properties:
        userId:
          type: string
          pattern: "^usr_[A-Za-z0-9]+$"
        currency:
          type: string
          enum: [USD, EUR, INR]
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, quantity]
            additionalProperties: false
            properties:
              sku:
                type: string
              quantity:
                type: integer
                minimum: 1
        idempotencyKey:
          type: string
    Invoice:
      type: object
      required: [id, orderId, total, currency, pdfUrl, dueDate, status]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^inv_[A-Za-z0-9_]+$"
        orderId:
          type: string
          pattern: "^ord_[A-Za-z0-9]+$"
        total:
          type: number
          minimum: 0
        currency:
          type: string
          enum: [USD, EUR, INR]
        pdfUrl:
          type: string
          format: uri
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, open, paid, void]
        taxId:
          type: string
          deprecated: true
        legacyDiscountCode:
          type: string
          deprecated: true
    SearchResponse:
      type: object
      required: [results]
      additionalProperties: false
      properties:
        results:
          type: array
          items:
            type: object
            required: [id, type, title]
            additionalProperties: false
            properties:
              id:
                type: string
              type:
                type: string
                enum: [user, order]
              title:
                type: string
    Profile:
      type: object
      required: [id, userId, displayName, visibility]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^prof_[A-Za-z0-9]+$"
        userId:
          type: string
          pattern: "^usr_[A-Za-z0-9]+$"
        displayName:
          type: string
        visibility:
          type: string
          enum: [public, private]
    FeatureFlagList:
      type: object
      required: [flags]
      additionalProperties: false
      properties:
        flags:
          type: array
          items:
            type: object
            required: [key, enabled]
            additionalProperties: false
            properties:
              key:
                type: string
              enabled:
                type: boolean

